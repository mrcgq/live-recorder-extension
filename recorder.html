<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>直播内录器 - 控制面板</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width:100vw; height:100vh;
      font-family:'Microsoft YaHei',Arial,sans-serif;
      background:#0d0d0d; color:#fff;
      display:flex; flex-direction:column;
      overflow:hidden; user-select:none;
    }

    /* 标题栏 */
    .win-header {
      background:#1a1a1a; padding:10px 16px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:2px solid #e53935; flex-shrink:0;
    }
    .win-title {
      display:flex; align-items:center; gap:10px;
      font-size:14px; font-weight:bold; color:#fff;
    }
    .rec-dot {
      width:10px; height:10px; border-radius:50%;
      background:#e53935; animation:pulse 1.2s infinite;
      display:none;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
    .win-subtitle { font-size:11px; color:#666; }

    /* 状态横幅 */
    .status-banner {
      background:#111; border-bottom:1px solid #222;
      padding:10px 16px;
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0;
    }
    .status-left { display:flex; align-items:center; gap:10px; }
    .status-indicator {
      width:10px; height:10px; border-radius:50%;
      background:#3a3a3a; transition:background .3s;
    }
    .status-indicator.ready    { background:#4caf50; }
    .status-indicator.recording { background:#e53935; animation:pulse 1s infinite; }
    .status-indicator.paused   { background:#ff9800; }
    .status-text { font-size:13px; color:#bbb; }

    .timer-display {
      font-family:'Courier New',monospace;
      font-size:22px; font-weight:bold;
      color:#555; letter-spacing:3px;
      transition:color .3s;
    }
    .timer-display.recording { color:#ff3b30; }
    .timer-display.paused    { color:#ff9800; }

    /* 指标仪表 */
    .metrics-bar {
      background:#161616; border-bottom:1px solid #222;
      padding:8px 16px;
      display:flex; gap:20px; align-items:center;
      flex-shrink:0;
    }
    .metric {
      display:flex; align-items:center; gap:5px;
      font-size:11px; color:#666;
    }
    .metric-val {
      font-family:'Courier New',monospace;
      color:#4caf50; font-weight:bold; font-size:12px;
    }
    .metric-val.hot { color:#ff5252; }

    /* 主控区 */
    .main-section {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:16px; padding:16px;
    }

    /* 实时视频预览（保活核心） */
    #previewContainer {
      width: 100%;
      max-width: 440px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #333;
      display: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    #previewPlayer {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* 大录制按钮 */
    .big-rec-btn {
      width:80px; height:80px; border-radius:50%;
      border:4px solid #e53935; background:transparent;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .3s; position:relative;
    }
    .big-rec-btn:hover {
      box-shadow:0 0 30px rgba(229,57,53,0.6);
      transform:scale(1.05);
    }
    .big-rec-inner {
      width:36px; height:36px; border-radius:50%;
      background:#e53935; transition:all .3s;
    }
    .big-rec-btn.recording .big-rec-inner {
      border-radius:6px; width:28px; height:28px;
    }
    .big-rec-btn.paused .big-rec-inner {
      background:#ff9800; border-radius:3px;
      width:8px; height:28px; box-shadow:12px 0 0 #ff9800;
    }
    .rec-btn-label {
      font-size:12px; color:#666; text-align:center; margin-top:4px;
    }

    /* 副控按钮组 */
    .sub-controls {
      display:flex; gap:12px;
    }
    .sub-btn {
      background:#1e1e1e; border:1px solid #333;
      color:#bbb; padding:10px 24px; border-radius:8px;
      font-size:13px; cursor:pointer; font-family:inherit;
      transition:all .2s; display:flex; align-items:center; gap:6px;
    }
    .sub-btn:hover:not(:disabled) { border-color:#666; color:#fff; background:#2a2a2a; }
    .sub-btn:disabled { opacity:0.3; cursor:not-allowed; }
    .sub-btn.danger:hover:not(:disabled) { border-color:#e53935; color:#e53935; }
    .sub-btn.warn:hover:not(:disabled)   { border-color:#ff9800; color:#ff9800; }

    /* 质量选择 */
    .quality-section {
      display:flex; gap:8px; align-items:center;
    }
    .q-label { font-size:11px; color:#555; margin-right:4px; }
    .q-btn {
      background:#1e1e1e; border:1px solid #333;
      color:#888; padding:7px 18px; border-radius:6px;
      font-size:12px; cursor:pointer; font-weight:bold;
      transition:all .2s;
    }
    .q-btn:hover { border-color:#e53935; color:#fff; }
    .q-btn.active {
      background:linear-gradient(135deg,#1565c0,#0d47a1);
      border-color:#2196f3; color:#fff;
      box-shadow:0 0 10px rgba(33,150,243,.35);
    }
    .q-btn.uhd.active {
      background:linear-gradient(135deg,#6a1b9a,#4a148c);
      border-color:#9c27b0;
      box-shadow:0 0 10px rgba(156, 39, 176, .35);
    }

    /* 底部状态 */
    .footer {
      background:#111; border-top:1px solid #1e1e1e;
      padding:8px 16px;
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0; font-size:11px; color:#555;
    }

    /* 提示框 */
    .hint-box {
      background:#161616; border:1px solid #2a2a2a;
      border-radius:10px; padding:16px 24px;
      text-align:center; max-width:400px;
    }
    .hint-box p { font-size:13px; color:#666; line-height:1.8; }
    .hint-box strong { color:#bbb; }

    /* 错误条 */
    .error-bar {
      display:none; background:#2d1010;
      border-bottom:1px solid #e53935;
      padding:8px 16px; font-size:12px;
      color:#ff8a80; flex-shrink:0;
    }
  </style>
</head>
<body>

  <!-- 标题栏 -->
  <div class="win-header">
    <div class="win-title">
      <div class="rec-dot" id="recDot"></div>
      <span>🎬 直播内录器 Pro</span>
    </div>
    <div class="win-subtitle">独占保活引擎 · 后台切页流畅不花屏</div>
  </div>

  <!-- 错误提示 -->
  <div class="error-bar" id="errorBar"></div>

  <!-- 状态横幅 -->
  <div class="status-banner">
    <div class="status-left">
      <div class="status-indicator ready" id="statusDot"></div>
      <span class="status-text" id="statusText">就绪 — 请在网页直播视频上点击「⏺ 开始录制」</span>
    </div>
    <div class="timer-display" id="timerDisplay">00:00:00</div>
  </div>

  <!-- 实时指标 -->
  <div class="metrics-bar">
    <div class="metric">📦 大小 <span class="metric-val hot" id="mSize">0 B</span></div>
    <div class="metric">📡 速率 <span class="metric-val" id="mBitrate">0kbps</span></div>
    <div class="metric">📺 分辨率 <span class="metric-val" id="mRes">-</span></div>
    <div class="metric">🎞️ FPS <span class="metric-val" id="mFps">-</span></div>
    <div class="metric">💾 格式 <span class="metric-val" id="mFormat">-</span></div>
  </div>

  <!-- 主控区 -->
  <div class="main-section">

    <!-- 实时画面预览（保活核心） -->
    <div id="previewContainer">
      <video id="previewPlayer" autoplay playsinline muted></video>
    </div>

    <!-- 极轻量主动唤醒面板 [纠正 3] -->
    <div class="hint-box" id="hintBox">
      <p>
        <strong>📌 使用方式</strong><br>
        将鼠标移至直播网页中的视频画面<br>
        点击出现的 <strong>「⏺ 开始录制」</strong> 按钮即可。<br>
        <span style="color: #666; font-size: 11px;">(全屏播放时，录制控制栏会自动挂载在全屏最上层)</span>
      </p>
      
      <!-- 主动直录强力唤醒按钮 -->
      <div style="margin-top: 15px;">
        <button class="sub-btn" id="btnActiveStart" style="background: #e53935; color: #fff; border: none; margin: 0 auto; font-weight: bold; width: 100%; border-radius: 6px;">
          ⏺ 立即开始网页内直录
        </button>
      </div>
    </div>

    <!-- 录制控制（录制中显示）-->
    <div id="recControls" style="display:none; flex-direction:column; align-items:center; gap:20px;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
        <button class="big-rec-btn" id="bigRecBtn" title="停止录制">
          <div class="big-rec-inner"></div>
        </button>
        <span class="rec-btn-label" id="bigRecLabel">点击停止</span>
      </div>

      <div class="sub-controls">
        <button class="sub-btn warn" id="btnPause" disabled>⏸ 暂停</button>
        <button class="sub-btn danger" id="btnStop">⏹ 停止并保存</button>
      </div>
    </div>

    <!-- 质量选择 -->
    <div class="quality-section">
      <span class="q-label">录制质量：</span>
      <button class="q-btn uhd" id="qUHD">超清 4K</button>
      <button class="q-btn active" id="qHD">高清 1080P</button>
      <button class="q-btn" id="qSD">标清 720P</button>
    </div>

  </div>

  <!-- 底部 -->
  <div class="footer">
    <span>直播内录器 Pro v3.1 · 纯净视频流 + tabCapture 独占保活</span>
    <span id="footerInfo">等待录制...</span>
  </div>

  <script src="recorder.js"></script>
</body>
</html>
