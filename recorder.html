<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>直播内录器 · 录制控制</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --red      : #e53935;
      --red-dim  : rgba(229,57,53,0.2);
      --orange   : #ff9800;
      --green    : #4caf50;
      --bg0      : #0a0a0a;
      --bg1      : #141414;
      --bg2      : #1c1c1c;
      --bg3      : #242424;
      --border   : #2a2a2a;
      --text-main: #f0f0f0;
      --text-sub : #888;
      --text-dim : #444;
    }

    body {
      width:100vw; height:100vh;
      font-family:'Microsoft YaHei','PingFang SC',Arial,sans-serif;
      background:var(--bg0); color:var(--text-main);
      display:flex; flex-direction:column;
      overflow:hidden; user-select:none;
    }

    /* ── 标题栏 ── */
    .title-bar {
      background:var(--bg1);
      padding:0 16px;
      height:46px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:2px solid var(--red);
      flex-shrink:0;
    }
    .title-left {
      display:flex; align-items:center; gap:10px;
    }
    .title-logo {
      width:28px; height:28px;
      background:linear-gradient(135deg,#e53935,#ff6f00);
      border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; flex-shrink:0;
    }
    .title-text { font-size:14px; font-weight:bold; color:var(--text-main); }
    .title-sub  { font-size:11px; color:var(--text-dim); margin-top:1px; }
    .rec-dot {
      width:9px; height:9px; border-radius:50%;
      background:var(--red); display:none;
      animation:blink 1.1s infinite;
      box-shadow:0 0 6px var(--red);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── 错误条 ── */
    .error-bar {
      display:none; background:#2a0f0f;
      border-bottom:1px solid var(--red);
      padding:8px 16px; font-size:12px;
      color:#ff8a80; flex-shrink:0;
    }

    /* ── 视频预览区（★ R-02：tabCapture 流实时预览）── */
    .preview-wrap {
      flex:1; background:#000;
      display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden; min-height:0;
    }
    #previewPlayer {
      width:100%; height:100%;
      object-fit:contain; display:block;
    }
    .preview-overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:14px; pointer-events:none;
    }
    .preview-overlay .idle-icon { font-size:52px; opacity:.25; }
    .preview-overlay .idle-text {
      font-size:13px; color:var(--text-dim);
      line-height:1.8; text-align:center;
    }
    .preview-overlay .idle-text strong { color:var(--text-sub); }

    /* 录制时的实时时钟水印 */
    .rec-watermark {
      position:absolute; top:12px; left:12px;
      background:rgba(0,0,0,0.7);
      border:1px solid rgba(229,57,53,0.5);
      border-radius:6px; padding:4px 10px;
      font-family:'Courier New',monospace;
      font-size:13px; font-weight:bold;
      color:#ff5252; letter-spacing:1px;
      display:none;
    }
    .rec-watermark.show { display:block; }

    /* ── 底部控制台 ── */
    .console {
      background:var(--bg1);
      border-top:1px solid var(--border);
      padding:10px 16px;
      display:flex; align-items:center;
      justify-content:space-between; gap:14px;
      flex-shrink:0;
    }

    /* 左侧：质量 + 暂停 */
    .console-left { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

    .q-btn {
      background:var(--bg3); border:1px solid var(--border);
      color:var(--text-sub); padding:6px 13px;
      border-radius:5px; font-size:11px;
      cursor:pointer; font-weight:bold;
      transition:all .2s; font-family:inherit;
    }
    .q-btn:hover { border-color:var(--red); color:var(--text-main); }
    .q-btn.active {
      background:linear-gradient(135deg,#1565c0,#0d47a1);
      border-color:#2196f3; color:#fff;
      box-shadow:0 0 10px rgba(33,150,243,.3);
    }
    .q-btn.uhd.active {
      background:linear-gradient(135deg,#6a1b9a,#4a148c);
      border-color:#9c27b0;
      box-shadow:0 0 10px rgba(156,39,176,.3);
    }

    .pause-btn {
      background:rgba(255,152,0,.1);
      border:1px solid rgba(255,152,0,.5);
      color:var(--orange); padding:6px 14px;
      border-radius:5px; font-size:11px;
      cursor:pointer; font-family:inherit;
      transition:all .2s; display:none;
      white-space:nowrap;
    }
    .pause-btn:hover { background:rgba(255,152,0,.2); }

    /* 中：大圆形录制按钮 */
    .console-center { display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; }
    .big-btn {
      width:56px; height:56px; border-radius:50%;
      border:3px solid var(--red); background:transparent;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .3s;
    }
    .big-btn:hover { box-shadow:0 0 22px rgba(229,57,53,.65); transform:scale(1.06); }
    .big-inner {
      width:26px; height:26px; border-radius:50%;
      background:var(--red); transition:all .3s;
    }
    .big-btn.recording .big-inner { border-radius:5px; width:20px; height:20px; }
    .big-btn.paused .big-inner {
      background:var(--orange); border-radius:3px;
      width:7px; height:22px; box-shadow:11px 0 0 var(--orange);
    }
    .btn-label { font-size:10px; color:var(--text-dim); text-align:center; }

    /* 右：仪表盘 */
    .console-right { flex-shrink:0; }
    .dashboard {
      background:var(--bg0); border:1px solid var(--border);
      border-radius:8px; padding:7px 14px;
      min-width:260px; font-family:'Courier New',monospace;
    }
    .dash-top {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:5px;
    }
    .dash-timer { font-size:18px; font-weight:bold; color:#ff3b30; letter-spacing:2px; }
    .dash-size  { font-size:13px; font-weight:bold; color:var(--text-main); }
    .dash-bottom { display:flex; gap:14px; font-size:10px; color:var(--text-dim); flex-wrap:wrap; }
    .dash-bottom b { color:var(--green); font-weight:bold; }
  </style>
</head>
<body>

  <!-- 标题栏 -->
  <div class="title-bar">
    <div class="title-left">
      <div class="title-logo">🎬</div>
      <div>
        <div class="title-text">直播内录器 Pro</div>
        <div class="title-sub" id="titleSub">Compositor-Level Capture · 纯净视频流</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="rec-dot" id="recDot"></div>
      <span id="titleStatus" style="font-size:12px;color:var(--text-dim);">就绪</span>
    </div>
  </div>

  <!-- 错误条 -->
  <div class="error-bar" id="errorBar"></div>

  <!-- ★ R-02：视频预览区（tabCapture 流实时渲染） -->
  <div class="preview-wrap">
    <video id="previewPlayer" autoplay playsinline muted></video>

    <!-- 空闲占位提示 -->
    <div class="preview-overlay" id="idleOverlay">
      <div class="idle-icon">🎥</div>
      <div class="idle-text">
        <strong>录制控制窗口已就绪</strong><br>
        请将鼠标移至直播网页视频画面<br>
        点击「⏺ 开始录制」按钮即可启动<br>
        <span style="color:#333;font-size:11px;margin-top:6px;display:block;">
          录制流为 Compositor 合成器级捕获 · 绝不卡顿
        </span>
      </div>
    </div>

    <!-- 录制时间水印 -->
    <div class="rec-watermark" id="recWatermark">00:00:00 · REC</div>
  </div>

  <!-- 底部控制台 -->
  <div class="console">

    <!-- 左：质量 + 暂停 -->
    <div class="console-left">
      <button class="q-btn uhd" id="wUHD">超清</button>
      <button class="q-btn active" id="wHD">高清</button>
      <button class="q-btn" id="wSD">标清</button>
      <button class="pause-btn" id="wPause">⏸ 暂停</button>
    </div>

    <!-- 中：大按钮 -->
    <div class="console-center">
      <button class="big-btn" id="wRecBtn">
        <div class="big-inner"></div>
      </button>
      <span class="btn-label" id="wBtnLabel">● 开始录制</span>
    </div>

    <!-- 右：仪表盘 -->
    <div class="console-right">
      <div class="dashboard">
        <div class="dash-top">
          <div class="dash-timer" id="wTimer">00:00:00</div>
          <div class="dash-size"  id="wSize">0 B</div>
        </div>
        <div class="dash-bottom">
          <span>CPU: <b id="wCpu">0%</b></span>
          <span>FPS: <b id="wFps">-</b></span>
          <span>码率: <b id="wBitrate">0kbps</b></span>
          <span>分辨率: <b id="wRes">-</b></span>
        </div>
      </div>
    </div>

  </div>

  <script src="recorder.js"></script>
</body>
</html>
